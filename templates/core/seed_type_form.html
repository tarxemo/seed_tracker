{% extends 'base.html' %}
{% load i18n %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="form-card">
    <h5 style="font-weight:700;margin-bottom:20px"><i class="fas fa-leaf me-2" style="color:#1a6b3c"></i>{{ title }}</h5>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">{% trans "Name" %} *</label>{{ form.name }}</div>
      <div class="mb-3"><label class="form-label">{% trans "Unit" %} *</label>{{ form.unit }}</div>
      <div class="mb-3"><label class="form-label">{% trans "Description" %}</label>{{ form.description }}</div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
        <a href="{% url 'seed_type_list' %}" class="btn btn-outline-secondary">{% trans "Cancel" %}</a>
      </div>
    </form>
  </div>
</div></div>
{% endblock %}
