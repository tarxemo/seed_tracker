{% extends 'base.html' %}
{% load i18n %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="form-card">
    <h5 style="font-weight:700;margin-bottom:20px"><i class="fas fa-calendar-alt me-2" style="color:#1a6b3c"></i>{{ title }}</h5>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">{% trans "Season Name" %} *</label>{{ form.name }}</div>
      <div class="mb-3"><label class="form-label">{% trans "Start Date" %} *</label>{{ form.start_date }}</div>
      <div class="mb-3"><label class="form-label">{% trans "End Date" %} *</label>{{ form.end_date }}</div>
      <div class="mb-3 d-flex align-items-center gap-2">{{ form.is_active }}<label class="form-label mb-0">{% trans "Set as Active Season" %}</label></div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{% trans "Save Season" %}</button>
        <a href="{% url 'season_list' %}" class="btn btn-outline-secondary">{% trans "Cancel" %}</a>
      </div>
    </form>
  </div>
</div></div>
{% endblock %}
